name: SWH SWHID backfill

# Polls Software Heritage hourly for entries the hub marked as awaiting
# archival (swhPending: true) and writes the SWHID into the seed YAML once
# SWH has ingested the repo. Entries older than 72h get marked swhFailed.
# All edits land in a PR for human review — no direct commits to main.

on:
  schedule:
    # Every 60 minutes, on the hour.
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: swh-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run SWH backfill
        run: node scripts/swh-backfill.mjs

      - name: Open PR with backfilled SWHIDs
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'data: backfill SWHIDs from Software Heritage'
          branch: swh-backfill/${{ github.run_id }}
          delete-branch: true
          title: 'Backfill SWHIDs from Software Heritage'
          body: |
            Automated SWHID backfill from the hourly cron.

            For each pending package whose repo Software Heritage has now
            archived, this PR writes `swhid` and clears `swhPending` /
            `swhSubmittedAt`. Entries older than 72 hours are marked
            `swhFailed: true` so the cron stops polling them.

            CI will validate the schema. Merge after a quick eyeball.
          labels: |
            automated
            swh
